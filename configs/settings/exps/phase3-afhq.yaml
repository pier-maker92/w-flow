# @package _global_
# Phase 3 — AFHQ 64x64, DiT backbone, FSQ bottleneck.
data_dim: 256
image_size: 64
in_channels: 3
use_velocity_quant: false

training:
  output_dir: checkpoints/exps/phase3-afhq
  num_train_epochs: 200
  per_device_train_batch_size: 32
  learning_rate: 1e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  seed: 42
  dataset_name: afhq
  eval_num_samples: 200
  save_steps: 5000
  eval_steps: 5000
  logging_steps: 200
  bf16: true
  fp16: false
  report_to: wandb
  wandb_project: flow-quant
  wandb_run_name: phase3-afhq-dit-fsq-stochastic
  gaussians_n: null
  gaussians_radius: null
  gaussians_std: null
  swissroll_noise: null

flow:
  flow_type: ot_cfm
  solver: midpoint
  num_steps: 50
  t_q: 0.5
  source_std: 1.0
  commitment_weight: 0.1

mlp_backbone: null
unet_backbone: null
dit_backbone:
  hidden_dim: 512
  num_heads: 8
  depth: 12
  patch_size: 4
  time_embed_dim: 256

vq: null
fsq:
  levels: [8, 5, 5, 5]   # effective codebook size: 8*5*5*5 = 1000

stochastic_dequantizer:
  sigma: 0.1
residual_dequantizer: null
