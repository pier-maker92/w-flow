# @package _global_
# Phase 2 — Fashion-MNIST 28x28, MLP backbone (flat), VQ + stochastic dequantizer.
# image_size: null because the model flattens [1,28,28] -> 784 for MLP.
# For a proper spatial treatment, switch to unet_backbone.
data_dim: 784
image_size: 28
in_channels: 1
use_velocity_quant: false

training:
  output_dir: checkpoints/exps/phase2-fashion-mnist
  num_train_epochs: 100
  per_device_train_batch_size: 128
  learning_rate: 2e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  seed: 42
  dataset_name: fashion_mnist
  eval_num_samples: 500
  save_steps: 2000
  eval_steps: 2000
  logging_steps: 100
  bf16: false
  fp16: false
  report_to: wandb
  wandb_project: flow-quant
  wandb_run_name: phase2-fashion-mnist-vq-stochastic
  gaussians_n: null
  gaussians_radius: null
  gaussians_std: null
  swissroll_noise: null

flow:
  flow_type: rectified
  solver: midpoint
  num_steps: 50
  t_q: 0.5
  source_std: 1.0
  commitment_weight: 0.25

mlp_backbone:
  hidden_dim: 512
  num_layers: 6
  time_embed_dim: 128
unet_backbone: null
dit_backbone: null

vq:
  num_embeddings: 512
  embedding_dim: 784
  commitment_weight: 0.25
  use_ema: true
fsq: null

stochastic_dequantizer:
  sigma: 0.05
residual_dequantizer: null
