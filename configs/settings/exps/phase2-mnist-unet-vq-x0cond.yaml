# @package _global_
# Phase 2 — MNIST, VQ nel bottleneck del UNet (GAP → 1 codice globale/immagine).
# embedding_dim = base_channels * mults[-1] = 64*4 = 256.
# x0-cond: UNet riceve [x_t ‖ x_0] a ogni step ODE.
# t_q=null: nessun waypoint nel pixel space; VQ è strutturale (ogni forward pass).
data_dim: 784
image_size: 28
in_channels: 1
use_velocity_quant: false

training:
  output_dir: checkpoints/exps/phase2-mnist-unet-vq-x0cond
  num_train_epochs: 50
  per_device_train_batch_size: 128
  learning_rate: 2e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  seed: 42
  dataset_name: mnist
  eval_num_samples: 4
  save_steps: 2000
  eval_steps: 2000
  logging_steps: 100
  bf16: false
  fp16: false
  report_to: null
  wandb_project: null
  wandb_run_name: null
  gaussians_n: null
  gaussians_radius: null
  gaussians_std: null
  swissroll_noise: null

flow:
  flow_type: rectified
  solver: euler
  num_steps: 50
  t_q: null
  source_std: 1.0
  commitment_weight: 0.25

mlp_backbone: null
unet_backbone:
  base_channels: 64
  channel_multipliers: [1, 2, 4]
  num_res_blocks: 2
  time_embed_dim: 128
  attention_resolutions: [7]
  bottleneck_channels: 256
  use_x0_cond: true
  use_bottleneck_vq: true
  bottleneck_vq_num_embeddings: 16
  bottleneck_vq_use_ema: true
  bottleneck_vq_init_scale: 0.5
dit_backbone: null

vq: null
fsq: null

stochastic_dequantizer: null
residual_dequantizer: null
