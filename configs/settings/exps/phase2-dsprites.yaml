# @package _global_
# Phase 2 — dSprites 64x64, compact U-Net, VQ bottleneck.
data_dim: 128        # channel dim at U-Net bottleneck
image_size: 64
in_channels: 1
use_velocity_quant: false

training:
  output_dir: checkpoints/exps/phase2-dsprites
  num_train_epochs: 100
  per_device_train_batch_size: 64
  learning_rate: 1e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  seed: 42
  dataset_name: dsprites
  eval_num_samples: 500
  save_steps: 2000
  eval_steps: 2000
  logging_steps: 100
  bf16: true
  fp16: false
  report_to: wandb
  wandb_project: flow-quant
  wandb_run_name: phase2-dsprites-vq-stochastic
  gaussians_n: null
  gaussians_radius: null
  gaussians_std: null
  swissroll_noise: null

flow:
  flow_type: rectified
  solver: midpoint
  num_steps: 50
  t_q: 0.5
  source_std: 1.0
  commitment_weight: 0.25

mlp_backbone: null
unet_backbone:
  base_channels: 64
  channel_multipliers: [1, 2, 4]
  num_res_blocks: 2
  time_embed_dim: 128
  attention_resolutions: [16, 8]
  bottleneck_channels: 128
dit_backbone: null

vq:
  num_embeddings: 512
  embedding_dim: 128
  commitment_weight: 0.25
  use_ema: true
fsq: null

stochastic_dequantizer:
  sigma: 0.1
residual_dequantizer: null
