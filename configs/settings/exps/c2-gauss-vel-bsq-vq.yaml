# @package _global_
# Experiment C2 — 8-Gaussians, C1 backbone (frozen) + VQ waypoint at t=0.5, K=8
# Warmstart backbone from C1 checkpoint; only quantizer trains.
# Set warmstart_backbone_checkpoint to the C1 checkpoint path after C1 finishes.
data_dim: 2
image_size: null
in_channels: null
use_velocity_quant: false
use_velocity_bsq: true
velocity_bsq_threshold: 0.75

training:
  output_dir: checkpoints/exps/c2-gauss-vel-bsq-vq
  num_train_epochs: 200
  per_device_train_batch_size: 512
  learning_rate: 3e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  seed: 42
  dataset_name: gaussians
  eval_num_samples: 500
  save_steps: 50000
  eval_steps: 50000
  logging_steps: 100
  bf16: false
  fp16: false
  report_to: null
  wandb_project: null
  wandb_run_name: null
  gaussians_n: 100000
  gaussians_radius: 5.0
  gaussians_std: 0.3
  swissroll_noise: null
  # FILL IN after C1 finishes: path to C1 checkpoint dir (contains model.safetensors)
  warmstart_backbone_checkpoint: "/scratch/piermel/flow_quant/checkpoints/exps/05-July-2026/22:02:50_agent_c1-gauss-vel-bsq/checkpoint-39000"
  freeze_backbone: true

flow:
  flow_type: rectified
  solver: midpoint
  num_steps: 100
  t_q: 0.5
  quant_target: x_tq
  source_std: 1.0
  commitment_weight: 0.25

mlp_backbone:
  hidden_dim: 256
  num_layers: 4
  time_embed_dim: 64
  use_x0_cond: true
unet_backbone: null
dit_backbone: null

vq:
  num_embeddings: 8
  embedding_dim: 2
  commitment_weight: 0.25
  use_ema: false   # must be false: EMA gives no grad; backbone frozen → nothing to train
  embedding_init_scale: null
fsq: null
bsq: null

stochastic_dequantizer: null
residual_dequantizer: null
linear_dequantizer: null
