# @package _global_
# Experiment C — 8-Gaussians, velocity BSQ (128 bits), t_q=0.5
# Pipeline: v ∈ ℝ² → Linear(2→128) → L2-norm → sign → {-1,+1}^128 → Linear(128→2) → v̂
data_dim: 2
image_size: null
in_channels: null
use_velocity_quant: false

training:
  output_dir: checkpoints/exps/c-gauss-vel-bsq-128
  num_train_epochs: 200
  per_device_train_batch_size: 512
  learning_rate: 3e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  seed: 42
  dataset_name: gaussians
  eval_num_samples: 500
  save_steps: 50000
  eval_steps: 50000
  logging_steps: 100
  bf16: false
  fp16: false
  report_to: null
  wandb_project: null
  wandb_run_name: null
  gaussians_n: 100000
  gaussians_radius: 5.0
  gaussians_std: 0.3
  swissroll_noise: null

flow:
  flow_type: rectified
  solver: midpoint
  num_steps: 100
  t_q: 0.5
  quant_target: velocity
  source_std: 1.0
  commitment_weight: 0.25

mlp_backbone:
  hidden_dim: 256
  num_layers: 4
  time_embed_dim: 64
  use_x0_cond: true
unet_backbone: null
dit_backbone: null

vq: null
fsq: null
bsq:
  dim: 128
  in_dim: 2

stochastic_dequantizer: null
residual_dequantizer: null
linear_dequantizer:
  in_dim: 128
  out_dim: 2
